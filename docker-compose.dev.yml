version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: parking_db_dev
    ports:
      - "5432:5432" # Mở port thoải mái để dev dễ xem data
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASS:-dev_password_123}
      POSTGRES_DB: parking_db
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./database/webDb.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - parking-network-dev

  redis:
    image: redis:latest
    container_name: parking_redis_dev
    ports:
      - "6379:6379"
    networks:
      - parking-network-dev

  ai-service:
    build: 
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: parking_ai_dev
    ports:
      - "8000:8000"
    volumes:
      # Mount code Python vào để hot-reload (nếu dùng Uvicorn --reload)
      - ./ai-service:/app 
      - ./ai-service/models:/app/models
    networks:
      - parking-network-dev
  
  api-server:
    image: maven:3.9-eclipse-temurin-17
    container_name: parking_api_dev
    working_dir: /app
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/parking_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:-dev_password_123}
      SPRING_REDIS_HOST: redis
      AI_SERVICE_URL: http://ai-service:8000/api/v1/ai/detect-plate
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./backend:/app          # Mount code Java
      - maven-cache:/root/.m2   # Cache thư viện
    depends_on:
      - postgres
      - redis
    networks:
      - parking-network-dev

networks:
  parking-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  maven-cache: