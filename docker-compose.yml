version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: parking_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: parking_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/webDb.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d parking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Trạm trung chuyển tin nhắn siêu tốc & Cache
  redis:
    image: redis:latest
    container_name: parking_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

