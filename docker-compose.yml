version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: parking_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: parking_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/webDb.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d parking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Trạm trung chuyển tin nhắn siêu tốc & Cache
  redis:
    image: redis:latest
    container_name: parking_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # 1. AI Service (Python FastAPI)
  ai-service:
    build: 
      context: ./ai-service-python
      dockerfile: Dockerfile
    container_name: parking_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Lắp volume để model không bị copy vào image, giảm dung lượng image
    volumes:
      - ./ai-service-python/models:/app/models
  
  # 2. Backend API Server (Spring Boot)
  api-server:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: parking_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/parking_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_REDIS_HOST=redis
      # GỌI SANG PYTHON QUA TÊN CONTAINER, KHÔNG DÙNG LOCALHOST
      - AI_SERVICE_URL=http://ai-service:8000/api/detect-license-plate 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parking_frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Map port 80 của Nginx trong container ra 3000 của host
    depends_on:
      - api-server


volumes:
  postgres_data: